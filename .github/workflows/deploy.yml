name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js with static export
        run: npm run build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: 'true'

      - name: Prepare static files for GitHub Pages
        run: |
          # Create out directory for GitHub Pages
          mkdir -p out
          
          # Copy the .next/static folder
          if [ -d ".next/static" ]; then
            cp -r .next/static out/_next/
          fi
          
          # Copy public assets
          if [ -d "public" ]; then
            cp -r public/* out/ 2>/dev/null || true
          fi
          
          # Create .nojekyll to skip Jekyll processing
          touch out/.nojekyll
          
          # Add 404.html for client-side routing fallback
          if [ -f "out/404.html" ]; then
            cp out/404.html out/404-redirect.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

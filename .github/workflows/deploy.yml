name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Export static pages
        run: |
          # Create out directory
          mkdir -p out
          
          # Copy static content from .next/static
          cp -r .next/static out/_next/ 2>/dev/null || true
          
          # Copy public assets
          cp -r public/* out/ 2>/dev/null || true
          
          # Extract prerendered pages from .next
          if [ -d ".next/server/pages" ]; then
            cp -r .next/server/pages/* out/ 2>/dev/null || true
          fi
          
          # For ISR/SSG pages
          if [ -d ".next/server/app" ]; then
            find .next/server/app -name "*.html" -o -name "*.json" | while read file; do
              dir=$(dirname "${file}" | sed 's|.next/server/app||')
              mkdir -p "out$dir"
              cp "$file" "out$dir/"
            done
          fi
          
          # Create index.html for all routes
          npm run build:static || echo "No static build script available"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
